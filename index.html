<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điểm Danh Thầy Hoan</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; padding: 20px; display: flex; justify-content: center; }
        .box { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 15px; shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn-group { display: flex; gap: 5px; }
        button { padding: 8px; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; background: white; }
        .active-co { background: #27ae60; color: white; }
        .active-vang { background: #e74c3c; color: white; }
        .save-btn { width: 100%; padding: 15px; margin-top: 20px; background: #2c3e50; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>ĐIỂM DANH LỚP HỌC</h2>
    <table>
        <tbody id="list"></tbody>
    </table>
    <button class="save-btn" onclick="send()">LƯU DỮ LIỆU</button>
</div>
<script>
    const students = ["Nguyệt", "Ngọc Duy", "Linh Đan", "Tommy", "Tra", "Amanda", "Moon"];
    const SCRIPT_URL = "DÁN_LINK_APPS_SCRIPT_CỦA_THẦY_VÀO_ĐÂY";

    const list = document.getElementById('list');
    students.forEach(name => {
        list.innerHTML += `<tr><td><strong>${name}</strong></td><td class="btn-group">
            <button onclick="mark(this, 'active-co')">CÓ</button>
            <button onclick="mark(this, 'active-vang')">VẮNG</button>
        </td></tr>`;
    });

    function mark(btn, cls) {
        btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active-co', 'active-vang'));
        btn.classList.add(cls);
    }

    async function send() {
        const data = [];
        document.querySelectorAll('tr').forEach(r => {
            const n = r.cells[0].innerText;
            const s = r.querySelector('.active-co, .active-vang')?.innerText;
            if(s) data.push({name: n, status: s});
        });
        if(data.length < students.length) return alert("Chưa điểm danh xong!");
        
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        alert("Đã lưu thành công!");
    }
</script>
</body>
</html>
